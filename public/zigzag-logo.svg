<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZigZag Shop">
  <!-- Generated by Claude — ZigZag Shop icon, app theme (teal → blue) -->
  <defs>
